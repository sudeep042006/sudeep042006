<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 350" width="550" height="350">
  <defs>
    <!-- Cyan/Blue-Green Neon Glow Filter for Blooming Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&amp;display=swap');
      
      .text-title {
        font-family: 'Fira Code', monospace;
        font-weight: 700;
        fill: #38bdf8;
        font-size: 22px;
        opacity: 0;
        animation: typing 1.2s steps(25) 0.2s forwards;
      }
      
      .text-subtitle {
        font-family: 'Fira Code', monospace;
        font-weight: 600;
        fill: #34d399;
        font-size: 12px;
        opacity: 0;
        animation: fadeIn 0.8s ease-in-out 1.2s forwards;
      }

      .text-label {
        font-family: 'Fira Code', monospace;
        font-size: 11px;
        fill: #94a3b8;
      }

      .text-val {
        font-family: 'Fira Code', monospace;
        font-size: 12px;
        font-weight: 700;
        fill: #e2e8f0;
      }

      /* Bloom & Scale Snapping (Boom & Stick) animation for cards */
      .card {
        transform-origin: center;
        opacity: 0;
        transform: scale(0.4);
        animation: cardBoom 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      .card-1 { animation-delay: 1.6s; transform-origin: 135px 125px; }
      .card-2 { animation-delay: 1.8s; transform-origin: 395px 125px; }
      .card-3 { animation-delay: 2.0s; transform-origin: 135px 235px; }
      .card-4 { animation-delay: 2.2s; transform-origin: 395px 235px; }

      /* Progress bar filling animation */
      .progress-fill {
        stroke-dasharray: 180;
        stroke-dashoffset: 180;
        animation: fillBar 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      /* Calculated target fills based on percentages */
      .fill-1 { stroke-dashoffset: 45; animation-delay: 2.6s; } /* 75% */
      .fill-2 { stroke-dashoffset: 81; animation-delay: 2.8s; } /* 55% */
      .fill-3 { stroke-dashoffset: 36; animation-delay: 3.0s; } /* 80% */
      .fill-4 { stroke-dashoffset: 27; animation-delay: 3.2s; } /* 85% */

      @keyframes typing {
        from { opacity: 0; transform: translateY(-5px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      @keyframes cardBoom {
        0% {
          opacity: 0;
          transform: scale(0.4);
          stroke: #06b6d4;
          filter: url(#glow);
        }
        75% {
          opacity: 1;
          transform: scale(1.12);
          stroke: #10b981;
          filter: url(#glow);
        }
        100% {
          opacity: 1;
          transform: scale(1);
          stroke: #334155;
          filter: none;
        }
      }

      @keyframes fillBar {
        to { stroke-dashoffset: var(--target); }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <!-- Animated Header Title and Titles -->
  <text x="20" y="40" class="text-title">⚡ Sudeep Kiran Kuralkar ⚡</text>
  <text x="20" y="65" class="text-subtitle">Software Engineer // AI-ML Enthusiast // Android Developer</text>

  <!-- Focus Cards (Focus & Skills) -->
  
  <!-- CARD 1: Java & DSA -->
  <g class="card card-1">
    <rect x="20" y="90" width="230" height="80" rx="8" fill="#0b1329" stroke="#334155" stroke-width="1.5" />
    <text x="35" y="118" class="text-val">☕ Java &amp; DSA</text>
    <text x="35" y="135" class="text-label">Level: 75% (Levelling Up)</text>
    <line x1="35" y1="150" x2="215" y2="150" stroke="#1e293b" stroke-width="6" stroke-linecap="round" />
    <line x1="35" y1="150" x2="215" y2="150" stroke="#a78bfa" stroke-width="6" stroke-linecap="round" class="progress-fill fill-1" style="--target: 45;" />
  </g>

  <!-- CARD 2: AI / ML -->
  <g class="card card-2">
    <rect x="280" y="90" width="230" height="80" rx="8" fill="#0b1329" stroke="#334155" stroke-width="1.5" />
    <text x="295" y="118" class="text-val">🤖 AI &amp; ML Engineering</text>
    <text x="295" y="135" class="text-label">Level: 55% (Exploring)</text>
    <line x1="295" y1="150" x2="475" y2="150" stroke="#1e293b" stroke-width="6" stroke-linecap="round" />
    <line x1="295" y1="150" x2="475" y2="150" stroke="#f43f5e" stroke-width="6" stroke-linecap="round" class="progress-fill fill-2" style="--target: 81;" />
  </g>

  <!-- CARD 3: Native Android -->
  <g class="card card-3">
    <rect x="20" y="195" width="230" height="80" rx="8" fill="#0b1329" stroke="#334155" stroke-width="1.5" />
    <text x="35" y="223" class="text-val">📱 Native Android Dev</text>
    <text x="35" y="240" class="text-label">Level: 80% (Building)</text>
    <line x1="35" y1="255" x2="215" y2="255" stroke="#1e293b" stroke-width="6" stroke-linecap="round" />
    <line x1="35" y1="255" x2="215" y2="255" stroke="#34d399" stroke-width="6" stroke-linecap="round" class="progress-fill fill-3" style="--target: 36;" />
  </g>

  <!-- CARD 4: MERN Stack -->
  <g class="card card-4">
    <rect x="280" y="195" width="230" height="80" rx="8" fill="#0b1329" stroke="#334155" stroke-width="1.5" />
    <text x="295" y="223" class="text-val">🌐 MERN Full Stack</text>
    <text x="295" y="240" class="text-label">Level: 85% (Solid Base)</text>
    <line x1="295" y1="255" x2="475" y2="255" stroke="#1e293b" stroke-width="6" stroke-linecap="round" />
    <line x1="295" y1="255" x2="475" y2="255" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" class="progress-fill fill-4" style="--target: 27;" />
  </g>

  <!-- Philosophy Bottom Banner -->
  <text x="20" y="305" font-family="'Fira Code', monospace" font-size="10" fill="#64748b" opacity="0" style="animation: fadeIn 1s ease-in-out 3.5s forwards;">
    🛡️ Discipline of Cap · 🦾 Mind of Iron Man · 🕸️ Humility of Spidey
  </text>
  <text x="20" y="325" font-family="'Fira Code', monospace" font-size="10" fill="#64748b" opacity="0" style="animation: fadeIn 1s ease-in-out 3.7s forwards;">
    🎓 B.Tech CSBS @ SVPCET '28 | Gearing up for GSoC 2027 🎯
  </text>
</svg>
